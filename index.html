        <!-- Para acessar o painel admin, deve entrar pela url
        <div class="card card-admin">
          <div class="card-header">
            <div class="card-icon">⚙️</div>
            <div>
              <h2>Administração</h2>
              <p style="font-size: 0.85em; color: #888; margin: 0;">Painel de controle</p>

            Configure templates de posts por categoria e defina posições de nome

        <div class="card card-user">

              <h2>Gerar Post</h2>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="database.js"></script>
    <script>
      // Verificar status da conexão
      window.addEventListener("load", () => {
        const statusEl = document.getElementById("connectionStatus");
        const indicator = document.querySelector(".status-indicator");

        if (useFirebase) {
          statusEl.textContent = "Online | Firebase";
          indicator.style.color = "#10b981";
        } else {
          statusEl.textContent = "Offline | Local";
          indicator.style.color = "#f59e0b";
        }
      });
    </script>
